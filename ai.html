<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordle</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; background: #121213; color: #fff; min-height: 100vh; }
  #header { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 420px; padding: 1rem 1rem 0.75rem; border-bottom: 1px solid #3a3a3c; }
  #title { font-size: 22px; font-weight: 700; letter-spacing: 3px; }
  #new-btn { font-size: 12px; padding: 5px 12px; border: 1px solid #555; border-radius: 6px; background: transparent; color: #ccc; cursor: pointer; }
  #new-btn:hover { background: #2a2a2c; }
  #msg { height: 30px; font-size: 14px; font-weight: 600; text-align: center; padding: 0.4rem; color: #fff; }
  #board { display: grid; grid-template-rows: repeat(6, 1fr); gap: 6px; padding: 1rem; width: 100%; max-width: 350px; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .tile { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; border: 2px solid #3a3a3c; color: #fff; background: #121213; transition: background 0.3s, border-color 0.3s; user-select: none; text-transform: uppercase; }
  .tile.filled { border-color: #565758; }
  .tile.correct { background: #538d4e; border-color: #538d4e; }
  .tile.present { background: #b59f3b; border-color: #b59f3b; }
  .tile.absent { background: #3a3a3c; border-color: #3a3a3c; }
  .tile.shake { animation: shake 0.4s ease; }
  .tile.flip { animation: flip 0.5s ease forwards; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
  @keyframes flip { 0%{transform:scaleY(1)} 50%{transform:scaleY(0)} 100%{transform:scaleY(1)} }
  #keyboard { display: flex; flex-direction: column; gap: 6px; padding: 0.5rem; width: 100%; max-width: 420px; }
  .kb-row { display: flex; justify-content: center; gap: 5px; }
  .key { height: 58px; min-width: 40px; padding: 0 6px; border: none; border-radius: 4px; background: #818384; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
  .key.wide { min-width: 58px; font-size: 12px; }
  .key:active { opacity: 0.7; }
  .key.correct { background: #538d4e; }
  .key.present { background: #b59f3b; }
  .key.absent { background: #3a3a3c; }
</style>
</head>
<body>

<div id="header">
  <span id="title">WORDLE</span>
  <button id="new-btn" onclick="newGame()">New word</button>
</div>
<div id="msg"></div>
<div id="board"></div>
<div id="keyboard"></div>

<script>
const WORDS = ["about","above","abuse","actor","acute","admit","adopt","adult","after","again","agent","agree","ahead","alarm","album","alert","alien","align","alike","alive","alley","allow","alone","along","alter","angel","anger","angle","angry","ankle","annex","antic","anvil","apart","apply","apron","arena","argue","arise","armor","aroma","arose","array","arrow","arson","asset","atlas","attic","audio","audit","avoid","awake","award","aware","awful","basic","basis","batch","bathe","beach","beard","beast","began","begin","being","below","bench","black","blade","blame","bland","blast","blaze","bleak","bleed","blend","bless","blind","blink","bloat","block","blood","blown","board","boast","bonus","boost","bound","boxer","brain","brand","brave","brawn","break","breed","bride","brief","bring","brink","brisk","broke","brook","brown","brush","build","built","bulge","bully","bunch","burst","buyer","cabin","cable","candy","canon","cargo","carry","carve","cause","cease","cedar","chain","chair","chalk","charm","chase","cheap","cheat","check","chess","chest","chief","child","choir","chord","civic","civil","claim","clamp","clash","class","clean","clear","clerk","click","cliff","climb","cling","clink","clock","cloth","cloud","clown","clump","coast","cobra","comic","coral","couch","cough","could","count","court","cover","craft","cramp","crane","crash","crawl","crazy","cream","crime","crisp","cross","crowd","crown","cruel","crush","crust","curve","cyber","cycle","daily","dance","datum","debut","decay","delta","dense","depot","depth","devil","digit","dingy","dirty","disco","ditch","dodge","dogma","donor","doubt","dough","dozen","draft","drain","drama","drank","drawl","dream","dress","dried","drill","drink","drive","drove","drown","drunk","dryer","early","earth","elite","embed","empty","endow","enter","entry","equal","error","essay","evade","event","evict","exact","excel","exist","exile","extra","fable","facet","faith","false","fancy","fatal","fault","feast","fence","feral","fetch","fever","fewer","fiber","field","fiend","fifth","fifty","fight","final","first","fixed","flair","flank","flare","flash","flask","flesh","fleet","float","flock","flood","floor","floss","flour","flown","flute","focal","fraud","fresh","front","frost","frown","fruit","funny","fussy","fuzzy","gamma","gauze","given","giver","gland","glare","glass","glaze","gloom","gloss","glove","grace","grade","grain","grand","grant","graph","grasp","grass","great","greed","green","greet","grief","grill","grind","groan","gross","group","grout","grove","growl","guard","guise","gusto","habit","happy","harsh","haste","hatch","haunt","haven","heart","heavy","hedge","hence","hinge","honey","honor","horse","hound","hover","human","humor","hurry","image","imply","index","indie","inept","infer","inner","input","inter","intro","irony","issue","jelly","jewel","joint","joker","judge","jumbo","jumpy","kebab","kneel","knife","knock","known","label","lance","large","laser","later","laugh","layer","leach","learn","lease","least","leave","legal","lemon","level","light","limit","liver","local","lodge","logic","loose","lotus","lower","loyal","lucid","lucky","lunar","magic","major","maker","manor","maple","march","marry","match","mayor","means","metal","might","minor","minus","model","moist","money","moral","motor","motto","mound","mount","mourn","mouth","movie","music","naive","nasty","naval","never","night","noble","noise","north","noted","notch","novel","nurse","occur","ocean","olive","onset","optic","orbit","order","outer","oxide","ozone","paint","paper","party","patch","pause","peace","penal","penny","perch","phase","phone","photo","piano","pilot","pinch","pizza","place","plain","plane","plank","plant","plaza","plead","plume","plump","point","poker","polka","pound","power","press","price","pride","prime","print","prior","probe","prone","proof","prose","prove","prowl","prune","pulse","punch","pupil","purge","queen","query","quest","queue","quick","quiet","quota","quote","radar","radio","rainy","rally","range","rapid","ratio","reach","realm","reign","repay","repel","resin","retro","ridge","risky","rival","river","rivet","roast","rocky","rogue","rough","round","route","ruler","rumor","salty","sauce","scale","scamp","scant","scare","scent","scene","scone","scope","score","scout","seize","sense","serve","setup","seven","shake","shall","shame","shank","shape","sharp","shear","sheep","sheen","shelf","shell","shift","shine","shirt","shock","shone","shook","shore","short","shout","shred","shrub","shrug","sight","silly","since","sixth","sixty","skill","skull","skunk","slate","slave","sleep","sleet","slice","slide","slime","slink","slope","smart","smear","smell","smile","smoke","snail","snake","sneak","solar","solve","sorry","south","space","spare","spark","speak","speed","spend","spice","spill","spine","spite","split","spoke","spoon","sport","spout","spray","spree","sprig","spunk","squad","squat","squid","staff","stage","stain","stale","stall","stamp","stand","stare","stark","start","state","steal","steam","steel","steep","steer","stern","stick","stiff","still","sting","stint","stomp","stony","stood","store","storm","stout","stove","straw","stray","strip","stuck","study","style","sugar","suite","sunny","super","surge","swamp","swarm","swear","sweat","sweep","sweet","swift","swipe","swirl","swoon","sword","syrup","talon","taper","taste","taunt","tears","tense","terms","theft","there","these","thick","thing","think","third","thorn","those","three","threw","throw","tiger","tight","timid","tinge","tired","title","toast","today","token","topaz","touch","tough","toxic","trace","track","trade","trail","train","trait","tramp","trash","trawl","tread","treat","trial","tribe","tried","trove","truce","trunk","truth","tulip","tumor","twang","tweak","twirl","ultra","under","union","unity","until","upper","urban","usual","utter","vague","valid","vapor","vault","video","vigil","viola","viral","virus","visor","vital","vivid","vocal","voice","voter","waste","watch","water","weary","weave","weird","whale","whack","wheat","wheel","where","which","while","white","whole","whose","witty","world","worry","worse","worst","worth","would","wound","wrath","wring","wrong","wrote","yacht","yearn","yield","young","youth","zesty"];

let answer, guesses, cur, gameOver;

function newGame() {
  answer = WORDS[Math.floor(Math.random() * WORDS.length)].toUpperCase();
  guesses = [];
  cur = '';
  gameOver = false;
  renderBoard();
  renderKeyboard();
  showMsg('');
}

function renderBoard() {
  const b = document.getElementById('board');
  b.innerHTML = '';
  for (let r = 0; r < 6; r++) {
    const row = document.createElement('div');
    row.className = 'row';
    row.id = 'row' + r;
    for (let c = 0; c < 5; c++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.id = `t${r}${c}`;
      if (r < guesses.length) {
        const g = guesses[r];
        tile.textContent = g[c].letter;
        tile.className = 'tile ' + g[c].state;
      }
      row.appendChild(tile);
    }
    b.appendChild(row);
  }
  updateCurrentRow();
}

function updateCurrentRow() {
  if (gameOver || guesses.length >= 6) return;
  const r = guesses.length;
  for (let c = 0; c < 5; c++) {
    const tile = document.getElementById(`t${r}${c}`);
    if (!tile) return;
    tile.textContent = cur[c] || '';
    tile.className = 'tile' + (cur[c] ? ' filled' : '');
  }
}

function renderKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  const rows = [
    ['Q','W','E','R','T','Y','U','I','O','P'],
    ['A','S','D','F','G','H','J','K','L'],
    ['ENTER','Z','X','C','V','B','N','M','⌫']
  ];
  const states = {};
  guesses.forEach(g => g.forEach(({ letter, state }) => {
    if (!states[letter] || state === 'correct' || (state === 'present' && states[letter] === 'absent'))
      states[letter] = state;
  }));
  rows.forEach(keys => {
    const row = document.createElement('div');
    row.className = 'kb-row';
    keys.forEach(k => {
      const btn = document.createElement('button');
      btn.className = 'key' + (k.length > 1 ? ' wide' : '');
      btn.textContent = k;
      if (states[k]) btn.classList.add(states[k]);
      btn.onclick = () => handleKey(k);
      row.appendChild(btn);
    });
    kb.appendChild(row);
  });
}

function handleKey(k) {
  if (gameOver) return;
  if (k === 'ENTER') submitGuess();
  else if (k === '⌫') { cur = cur.slice(0, -1); updateCurrentRow(); }
  else if (cur.length < 5 && /^[A-Z]$/.test(k)) { cur += k; updateCurrentRow(); }
}

function submitGuess() {
  if (cur.length < 5) { shakeCur(); showMsg('Not enough letters'); return; }
  if (!WORDS.includes(cur.toLowerCase())) { shakeCur(); showMsg('Not in word list'); return; }
  const result = score(cur);
  guesses.push(result);
  cur = '';
  flipRow(guesses.length - 1, result, () => {
    renderKeyboard();
    if (result.every(r => r.state === 'correct')) {
      gameOver = true;
      showMsg(['Genius!','Magnificent!','Impressive!','Splendid!','Great!','Phew!'][guesses.length - 1]);
    } else if (guesses.length >= 6) {
      gameOver = true;
      showMsg('The word was: ' + answer);
    }
  });
}

function score(guess) {
  const ans = answer.split('');
  const res = guess.split('').map(l => ({ letter: l, state: 'absent' }));
  const used = Array(5).fill(false);
  res.forEach((r, i) => { if (r.letter === ans[i]) { r.state = 'correct'; used[i] = true; } });
  res.forEach((r, i) => {
    if (r.state === 'correct') return;
    const j = ans.findIndex((a, ai) => !used[ai] && a === r.letter);
    if (j !== -1) { r.state = 'present'; used[j] = true; }
  });
  return res;
}

function flipRow(r, result, cb) {
  const tiles = [...document.getElementById('row' + r).children];
  tiles.forEach((tile, i) => {
    setTimeout(() => {
      tile.classList.add('flip');
      setTimeout(() => {
        tile.textContent = result[i].letter;
        tile.className = 'tile ' + result[i].state;
      }, 250);
    }, i * 120);
  });
  setTimeout(cb, tiles.length * 120 + 300);
}

function shakeCur() {
  const row = document.getElementById('row' + guesses.length);
  [...row.children].forEach(t => { t.classList.remove('shake'); void t.offsetWidth; t.classList.add('shake'); });
}

function showMsg(m) {
  const el = document.getElementById('msg');
  el.textContent = m;
  if (m && !gameOver) setTimeout(() => { if (el.textContent === m) el.textContent = ''; }, 2000);
}

document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key === 'Enter') handleKey('ENTER');
  else if (e.key === 'Backspace') handleKey('⌫');
  else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toUpperCase());
});

newGame();
</script>
